name: CD

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Copy Example Env to main env
        run: cp .env.example .env
           
      - name: Docker setup
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy the container with docker-compose
        run: |
          docker compose pull
          docker compose up -d


      
          