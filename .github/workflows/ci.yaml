name: CI

on:
  push:
      branches: [devsecops]

jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: action/checkout@v7

            - name: Setup NodeJs 
              uses: action/checkou@v6
              with:
                 node-version: '20'
                 cache: npm
                 cache-dependency-path: frontend/package-lock.json
                 
            - name: Install npm package
              run: npm install
              working-directory: frontend 
             
             
            - name: Run Linter
              run: npm run linter
              working-directory: frontend

            - name: Run Tests
              run: npm run test
              working-directory: frontend
              
            - name: Code Quality
              uses: .github/workflows/code-quality.yaml

            - name: Docker setup login
              uses: docker/login-action@v4
              with:
                 username: ${{ vars.DOCKERHUB_USERNAME }}
                 password: ${{ secrets.DOCKERHUB_TOKEN }}
                 
            - name: Docker buid and push
              uses: dodker/buiis-push-action@v7
              with:
                  context: ./frontend
                  push: true
                  tags: ${{ vars.DOCKER_USERNAME }} /devboard-frontend:latest
    backend:
          runs-on: ubuntu-latest
          steps:
            - name: code Checkout
              uses: actions/checkout@v7
              
            - name: setup GO
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                go-check-dependency-path: go.sum
                
            - name: Run Go Formatter
              run: go fmt
              working-directory: backend

            - name: Run Go Vet
              run: go vet
              working-directory: backend
            
            - name: Run Tests
              run: go test 
              working-directory: backend
            
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest
    deploy:
        needs: [frontend,backend]
        uses: ./.github/workflows/cd.yml
        secrets: inherit
            
                
                

                  
                  


            

              
