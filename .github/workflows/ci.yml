name: CI
on:
  push:
    branches: [ adavance ]
jobs:
   frontend:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout code
         uses: actions/checkout@v7

       - name: Set up Node.js
         uses: actions/setup-node@v6
         with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json

       - name: Install npm packages
         run: npm --prefix frontend/package.json install
      
       - name: Run Linter
         run: npm run lint

       - name: Run Tests
         run: npm run test
